version: "3.9"

services:
  db:
    image: mysql:8.0
    container_name: property_billing_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: "6172BBbb!"
      MYSQL_DATABASE: "property_value_billing"
      MYSQL_ROOT_HOST: "%"
    ports:
      - "3315:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./mysql-init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: property_billing_app
    depends_on:
      - db
    ports:
      - "8000:8000"
    environment:
      MYSQL_HOST: db
      MYSQL_USER: root
      MYSQL_PASSWORD: "6172BBbb!"
      MYSQL_DATABASE: property_value_billing
    volumes:
      - .:/app
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  db_data: {}
